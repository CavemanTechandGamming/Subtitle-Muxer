# =============================================================================
# Subtitle Muxer — manual multi-platform PyInstaller builds (artifacts only)
# Trigger: Actions → Build → Run workflow
# Also callable from the Build and Release workflow.
#
# Artifact names include the app version from src/__init__.py, e.g.:
#   subtitle-muxer-windows-1.0.0-portable
#   subtitle-muxer-ubuntu-1.0.0-portable
#   subtitle-muxer-fedora-1.0.0-installable
#
# Linux variants (Ubuntu / Debian / Mint / Fedora / Arch) build inside matching
# containers on ubuntu-latest — GitHub does not provide native runners for each.
# =============================================================================
name: Build

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: "Python version (Windows / macOS)"
        required: false
        default: "3.14"
        type: string
  workflow_call:
    inputs:
      python_version:
        description: "Python version (Windows / macOS)"
        required: false
        default: "3.14"
        type: string

permissions:
  contents: read

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Windows + macOS (hosted runners) ─────────────────────────────────────
  build-desktop:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}
          cache: pip
          cache-dependency-path: requirements/requirements.txt

      - name: Read app version
        id: version
        shell: bash
        run: |
          VERSION="$(python scripts/read_version.py)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "App version: ${VERSION}"

      - name: Setup env + build (Windows)
        if: matrix.platform == 'windows'
        shell: cmd
        run: |
          call scripts\setup_env.bat
          if errorlevel 1 exit /b 1
          call scripts\build_app.bat
          if errorlevel 1 exit /b 1

      - name: Setup env + build (macOS)
        if: matrix.platform == 'macos'
        run: |
          chmod +x scripts/setup_env.sh scripts/build_app.sh scripts/read_version.py
          ./scripts/setup_env.sh
          ./scripts/build_app.sh

      - name: Upload portable artifact
        uses: actions/upload-artifact@v7
        with:
          name: subtitle-muxer-${{ matrix.platform }}-${{ steps.version.outputs.version }}-portable
          path: dist/${{ matrix.platform }}/${{ steps.version.outputs.version }}/portable/**
          if-no-files-found: error
          retention-days: 30

      - name: Upload installable artifact
        uses: actions/upload-artifact@v7
        with:
          name: subtitle-muxer-${{ matrix.platform }}-${{ steps.version.outputs.version }}-installable
          path: dist/${{ matrix.platform }}/${{ steps.version.outputs.version }}/installable/**
          if-no-files-found: error
          retention-days: 30

  # ── Linux distros (containers) ───────────────────────────────────────────
  build-linux:
    name: Build (${{ matrix.platform }})
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu
            image: ubuntu:24.04
            pkgs: apt
          - platform: debian
            image: debian:bookworm
            pkgs: apt
          - platform: mint
            # Official Linux Mint Docker images (Ubuntu-based)
            image: linuxmintd/mint22.1-amd64
            pkgs: apt
          - platform: fedora
            image: fedora:latest
            pkgs: dnf
          - platform: arch
            image: archlinux:latest
            pkgs: pacman

    env:
      SUBTITLE_MUXER_PLATFORM: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install distro build dependencies
        run: |
          chmod +x scripts/ci_install_linux_deps.sh scripts/setup_env.sh scripts/build_app.sh scripts/read_version.py
          ./scripts/ci_install_linux_deps.sh "${{ matrix.pkgs }}"

      - name: Read app version
        id: version
        run: |
          VERSION="$(python3 scripts/read_version.py)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "App version: ${VERSION}"

      - name: Setup env
        run: ./scripts/setup_env.sh

      - name: Build with PyInstaller
        run: ./scripts/build_app.sh

      - name: Upload portable artifact
        uses: actions/upload-artifact@v7
        with:
          name: subtitle-muxer-${{ matrix.platform }}-${{ steps.version.outputs.version }}-portable
          path: dist/${{ matrix.platform }}/${{ steps.version.outputs.version }}/portable/**
          if-no-files-found: error
          retention-days: 30

      - name: Upload installable artifact
        uses: actions/upload-artifact@v7
        with:
          name: subtitle-muxer-${{ matrix.platform }}-${{ steps.version.outputs.version }}-installable
          path: dist/${{ matrix.platform }}/${{ steps.version.outputs.version }}/installable/**
          if-no-files-found: error
          retention-days: 30
