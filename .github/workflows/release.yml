# =============================================================================
# Subtitle Muxer — build all platforms, then publish a GitHub Release
# Trigger: Actions → Build and Release → Run workflow
#
# Version tag/assets come from src/__init__.py (__version__).
# Bump that value before running this workflow.
#
# Release zips follow artifact naming, e.g.:
#   SubtitleMuxer-0.1.0-windows-portable.zip
#   SubtitleMuxer-0.1.0-windows-installable.zip
#   SubtitleMuxer-0.1.0-macos-arm64-portable.zip
#   SubtitleMuxer-0.1.0-macos-intel-portable.zip
#   SubtitleMuxer-0.1.0-ubuntu-portable.zip
# =============================================================================
name: Build and Release

on:
  workflow_dispatch:
    inputs:
      python_version:
        description: "Python version"
        required: false
        default: "3.14"
        type: string
      draft:
        description: "Create as draft release"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build.yml
    with:
      python_version: ${{ inputs.python_version }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read app version
        id: version
        run: |
          VERSION="$(python3 scripts/read_version.py)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "App version: ${VERSION}"

      - name: Ensure release tag does not already exist
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release ${TAG} already exists. Bump __version__ in src/__init__.py and re-run."
            exit 1
          fi

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: subtitle-muxer-*
          path: artifacts

      - name: Package versioned release assets
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p release-assets
          shopt -s nullglob

          for dir in artifacts/subtitle-muxer-*-portable artifacts/subtitle-muxer-*-installable; do
            [[ -d "$dir" ]] || continue
            name="$(basename "$dir")"
            if [[ "$name" =~ ^subtitle-muxer-(windows|macos-arm64|macos-intel|ubuntu|debian|mint|fedora|arch)-(.+)-(portable|installable)$ ]]; then
              platform="${BASH_REMATCH[1]}"
              art_version="${BASH_REMATCH[2]}"
              kind="${BASH_REMATCH[3]}"
            else
              echo "::error::Unexpected artifact name: ${name}"
              exit 1
            fi

            if [[ "$art_version" != "$VERSION" ]]; then
              echo "::error::Artifact version ${art_version} does not match src __version__ ${VERSION}"
              exit 1
            fi

            zip_name="SubtitleMuxer-${VERSION}-${platform}-${kind}.zip"
            (cd "$dir" && zip -r -9 "$GITHUB_WORKSPACE/release-assets/${zip_name}" .)
            echo "Created ${zip_name}"
          done

          count="$(find release-assets -type f -name '*.zip' | wc -l)"
          if [[ "$count" -lt 1 ]]; then
            echo "::error::No release zips were created."
            exit 1
          fi

          echo "Release assets:"
          ls -lah release-assets

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"

          EXTRA_FLAGS=()
          if [[ "${{ inputs.draft }}" == "true" ]]; then
            EXTRA_FLAGS+=(--draft)
          fi
          if [[ "${{ inputs.prerelease }}" == "true" ]]; then
            EXTRA_FLAGS+=(--prerelease)
          fi

          gh release create "$TAG" \
            --title "Subtitle Muxer ${VERSION}" \
            --generate-notes \
            "${EXTRA_FLAGS[@]}" \
            release-assets/*
